<!-- @dsCard group="Brand" viewport="700x160" name="Button Interaction States" subtitle="Rest, hover (darker), press (scale down), disabled" -->
<link rel="stylesheet" href="../styles.css">
<style>
  .gwf-demo-btn { font-family:var(--font-body); font-weight:700; font-size:15px; border:none; border-radius:var(--radius-pill); padding:14px 26px; background:var(--color-primary); color:var(--color-text-on-primary); box-shadow:var(--shadow-sm); transition:transform 150ms ease-out, background 150ms ease-out; }
  .gwf-demo-btn.hover { background:var(--color-primary-hover); }
  .gwf-demo-btn.press { transform:scale(0.97); box-shadow:var(--shadow-pressed); }
  .gwf-demo-btn.disabled { background:var(--ink-100); color:var(--color-text-muted); box-shadow:none; }
</style>
<div style="display:flex; align-items:center; gap:14px; padding:20px; background:var(--color-bg); flex-wrap:wrap;">
  <button class="gwf-demo-btn">Rest</button>
  <button class="gwf-demo-btn hover">Hover</button>
  <button class="gwf-demo-btn press">Press</button>
  <button class="gwf-demo-btn disabled">Disabled</button>
</div>
