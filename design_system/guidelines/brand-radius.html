<link rel="stylesheet" href="../styles.css">
<div style="display:flex; align-items:center; gap:16px; padding:18px 20px; background:var(--color-bg); font-family:var(--font-mono); font-size:11px; color:var(--color-text-secondary);">
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-xs);"></div>xs</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-sm);"></div>sm</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-md);"></div>md</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-lg);"></div>lg</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-xl);"></div>xl</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:96px;height:40px;background:var(--color-primary);border-radius:var(--radius-pill);"></div>pill</div>
</div>
