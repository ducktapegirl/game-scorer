<!-- @dsCard group="Colors" viewport="700x160" name="Primary & Secondary" subtitle="Teal (primary) and coral (secondary)" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex; gap:8px; padding:16px; background:var(--color-bg); font-family:var(--font-body);">
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm);">
      <div style="flex:1; height:56px; background:var(--teal-300)"></div>
      <div style="flex:1; height:56px; background:var(--teal-400)"></div>
      <div style="flex:1; height:56px; background:var(--teal-500)"></div>
      <div style="flex:1; height:56px; background:var(--teal-600)"></div>
      <div style="flex:1; height:56px; background:var(--teal-700)"></div>
    </div>
    <div style="font-size:13px; color:var(--color-text-secondary);">Teal — primary / brand</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm);">
      <div style="flex:1; height:56px; background:var(--coral-300)"></div>
      <div style="flex:1; height:56px; background:var(--coral-400)"></div>
      <div style="flex:1; height:56px; background:var(--coral-500)"></div>
      <div style="flex:1; height:56px; background:var(--coral-600)"></div>
      <div style="flex:1; height:56px; background:var(--coral-700)"></div>
    </div>
    <div style="font-size:13px; color:var(--color-text-secondary);">Coral — secondary</div>
  </div>
</div>
