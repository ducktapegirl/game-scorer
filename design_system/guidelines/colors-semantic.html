<!-- @dsCard group="Colors" viewport="700x140" name="Semantic Status" subtitle="Success, warning, danger" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex; gap:12px; padding:16px; background:var(--color-bg); font-family:var(--font-body);">
  <div style="flex:1; padding:14px; border-radius:var(--radius-md); background:var(--color-success-soft); color:var(--olive-700);">
    <div style="width:14px;height:14px;border-radius:50%;background:var(--color-success); margin-bottom:8px;"></div>
    <div style="font-size:14px; font-weight:700;">Success</div>
    <div style="font-size:12px; opacity:0.8;">Game saved.</div>
  </div>
  <div style="flex:1; padding:14px; border-radius:var(--radius-md); background:var(--color-warning-soft); color:var(--mustard-700);">
    <div style="width:14px;height:14px;border-radius:50%;background:var(--color-warning); margin-bottom:8px;"></div>
    <div style="font-size:14px; font-weight:700;">Warning</div>
    <div style="font-size:12px; opacity:0.8;">Round not finished.</div>
  </div>
  <div style="flex:1; padding:14px; border-radius:var(--radius-md); background:var(--color-danger-soft); color:var(--red-500);">
    <div style="width:14px;height:14px;border-radius:50%;background:var(--color-danger); margin-bottom:8px;"></div>
    <div style="font-size:14px; font-weight:700;">Danger</div>
    <div style="font-size:12px; opacity:0.8;">Couldn't save score.</div>
  </div>
</div>
