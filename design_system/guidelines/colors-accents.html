<!-- @dsCard group="Colors" viewport="700x160" name="Accents" subtitle="Mustard and olive — status & highlight tones" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex; gap:8px; padding:16px; background:var(--color-bg); font-family:var(--font-body);">
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm);">
      <div style="flex:1; height:56px; background:var(--mustard-200)"></div>
      <div style="flex:1; height:56px; background:var(--mustard-300)"></div>
      <div style="flex:1; height:56px; background:var(--mustard-400)"></div>
      <div style="flex:1; height:56px; background:var(--mustard-500)"></div>
      <div style="flex:1; height:56px; background:var(--mustard-600)"></div>
    </div>
    <div style="font-size:13px; color:var(--color-text-secondary);">Mustard — accent / warning</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm);">
      <div style="flex:1; height:56px; background:var(--olive-200)"></div>
      <div style="flex:1; height:56px; background:var(--olive-300)"></div>
      <div style="flex:1; height:56px; background:var(--olive-400)"></div>
      <div style="flex:1; height:56px; background:var(--olive-500)"></div>
      <div style="flex:1; height:56px; background:var(--olive-600)"></div>
    </div>
    <div style="font-size:13px; color:var(--color-text-secondary);">Olive — accent / success</div>
  </div>
</div>
