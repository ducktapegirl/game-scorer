<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Ink & Cream" subtitle="Warm neutrals: text/ink scale and card-surface/cream scale" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex; gap:8px; padding:16px; background:var(--color-bg); font-family:var(--font-body);">
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm);">
      <div style="flex:1; height:48px; background:var(--ink-100)"></div>
      <div style="flex:1; height:48px; background:var(--ink-300)"></div>
      <div style="flex:1; height:48px; background:var(--ink-500)"></div>
      <div style="flex:1; height:48px; background:var(--ink-700)"></div>
      <div style="flex:1; height:48px; background:var(--ink-800)"></div>
    </div>
    <div style="font-size:13px; color:var(--color-text-secondary);">Ink — text & dark surfaces</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); border:1.5px solid var(--color-border);">
      <div style="flex:1; height:48px; background:var(--cream-0)"></div>
      <div style="flex:1; height:48px; background:var(--cream-25)"></div>
      <div style="flex:1; height:48px; background:var(--cream-50)"></div>
      <div style="flex:1; height:48px; background:var(--cream-100)"></div>
      <div style="flex:1; height:48px; background:var(--cream-200)"></div>
    </div>
    <div style="font-size:13px; color:var(--color-text-secondary);">Cream — card & surface tone</div>
  </div>
</div>
