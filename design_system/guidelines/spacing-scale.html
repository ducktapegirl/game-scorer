<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base unit, --space-1 through --space-16" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex; align-items:flex-end; gap:10px; padding:18px 20px; background:var(--color-bg); font-family:var(--font-mono); font-size:11px; color:var(--color-text-secondary);">
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:var(--space-1); height:var(--space-1); background:var(--color-primary);"></div>1</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:var(--space-2); height:var(--space-2); background:var(--color-primary);"></div>2</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:var(--space-3); height:var(--space-3); background:var(--color-primary);"></div>3</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:var(--space-4); height:var(--space-4); background:var(--color-primary);"></div>4</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:var(--space-6); height:var(--space-6); background:var(--color-primary);"></div>6</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:var(--space-8); height:var(--space-8); background:var(--color-primary);"></div>8</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:var(--space-12); height:var(--space-12); background:var(--color-primary);"></div>12</div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:var(--space-16); height:var(--space-16); background:var(--color-primary);"></div>16</div>
</div>
