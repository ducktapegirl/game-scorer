<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<div id="root" style="padding:20px; background:var(--color-bg); min-height:220px;"></div>
<script type="text/babel">
const { Dialog, Toast, Tooltip, Button, IconButton } = window.GamesWithFriendsDesignSystem_019dd7;
function Demo() {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20, fontFamily: 'var(--font-body)' }}>
      <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
        <Button variant="outline" onClick={() => setOpen(true)}>Open dialog</Button>
        <Tooltip label="Undo last score"><IconButton name="undo-2" /></Tooltip>
      </div>
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
        <Toast tone="success" message="Game saved." />
        <Toast tone="info" message="Round 3 started." />
        <Toast tone="error" message="Couldn't save that score." />
      </div>
      <Dialog open={open} title="End game?" onClose={() => setOpen(false)} footer={<>
        <Button variant="ghost" onClick={() => setOpen(false)}>Cancel</Button>
        <Button variant="primary" onClick={() => setOpen(false)}>End game</Button>
      </>}>
        This will save final scores and can't be undone.
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
